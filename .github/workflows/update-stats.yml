name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC todos os dias (menos congestionado)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVGs (direct GitHub API — no 3rd-party services)
        run: node generate-stats.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: KarenGomes

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg languages.svg
          git diff --cached --quiet || git commit -m "chore: update stats SVGs [skip ci]"
          git push